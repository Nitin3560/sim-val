scenario_id: circle_5m_nominal
description: "UAV flies a 3m radius circle at 5m altitude."

trajectory:
  mode: circle
  center: {x: 0.0, y: 0.0, z: -5.0}
  radius_m: 3.0
  period_s: 18.0
  total_duration_s: 36.0

sensors:
